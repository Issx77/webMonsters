<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mon Équipe – WebMonster</title>
    <link rel="stylesheet" th:href="@{/css/game.css}">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="header-logo">🎮 MONSTER WEB</div>
    <nav class="header-nav">
        <a class="nav-btn" th:href="@{/WebMonster/choix-monstre}">➕ Ajouter</a>
        <a class="nav-btn" th:href="@{/WebMonster/attente}">🏟 Jouer</a>
        <form sec:authorize="isAuthenticated()" th:action="@{/WebMonster/logout}" method="post" style="margin:0">
            <button class="nav-btn danger">Déconnexion</button>
        </form>
    </nav>
</header>

<!-- TITRE -->
<div class="page-title">⚔ MON ÉQUIPE ⚔</div>
<div class="page-subtitle"
     th:text="'Dresseur : ' + ${joueur.pseudo} + '  —  Niveau ' + ${joueur.niveau}">
    Dresseur : Jean — Niveau 1
</div>

<!-- GRILLE DE L'ÉQUIPE -->
<div class="equipe-grid" th:if="${not #lists.isEmpty(membres)}">
    <div class="membre-card" th:each="m : ${membres}">

        <!-- Emoji selon le type -->
        <div class="monstre-emoji"
             th:text="${m.monstre.type == 'FEU'} ? '🦎' : (${m.monstre.type == 'EAU'} ? '🐢' : '🦕')">
            🦎
        </div>

        <!-- Badge type -->
        <div class="type-badge"
             th:classappend="${m.monstre.type == 'FEU'} ? 'feu' : (${m.monstre.type == 'EAU'} ? 'eau' : 'terre')"
             th:text="${m.monstre.type == 'FEU'} ? '🔥 FEU' : (${m.monstre.type == 'EAU'} ? '💧 EAU' : '🌿 TERRE')">
            🔥 FEU
        </div>

        <div class="membre-nom-perso" th:text="${m.nomPerso}">Drako</div>
        <div class="membre-nom-base"  th:text="'(' + ${m.monstre.nom} + ')'">( Flamigon )</div>
        <div class="membre-niveau"    th:text="'⭐ Niveau ' + ${m.niveau}">⭐ Niveau 1</div>
        <div class="membre-pv"        th:text="'PV : ' + ${m.monstre.pointsDeVie}">PV : 45</div>

    </div>
</div>

<!-- ÉQUIPE VIDE -->
<div class="vide-msg" th:if="${#lists.isEmpty(membres)}">
    <p>😢 Ton équipe est vide !</p>
    <br>
    <a class="btn-action btn-ajouter" th:href="@{/WebMonster/choix-monstre}">
        ➕ Choisir un monstre
    </a>
</div>

<!-- BOUTON CONTINUER -->
<div style="text-align:center; margin-top: 20px;" th:if="${not #lists.isEmpty(membres)}">
    <a class="btn-action btn-jouer" th:href="@{/WebMonster/attente}">🏟 Aller en salle d'attente</a>
    <a class="btn-action btn-ajouter" th:href="@{/WebMonster/choix-monstre}">➕ Ajouter un monstre</a>
</div>

<!-- FOOTER -->
<footer>
    <div class="footer-links">
        <a th:href="@{/WebMonster/a-propos}">À propos</a>
        <a th:href="@{/WebMonster/contact}">Contact</a>
        <a th:href="@{/WebMonster/rgpd}">RGPD</a>
    </div>
    <p class="footer-copy">© 2025 Monster Web. Tous droits réservés.</p>
</footer>

</body>
</html>
